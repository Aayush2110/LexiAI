services:
  - type: web
    name: legalrag-backend
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LLM_PROVIDER
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_NAME
        value: LegalRAG AI Chatbot
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: False
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: chat_companion
      - key: CHROMA_PERSIST_DIR
        value: /opt/render/project/data/chromadb
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: ALLOWED_EXTENSIONS
        value: pdf,docx,txt
      - key: CHUNK_SIZE
        value: 1000
      - key: CHUNK_OVERLAP
        value: 200
      - key: TOP_K_RETRIEVAL
        value: 4
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: USE_HYBRID_SEARCH
        value: True
      - key: USE_RERANKING
        value: True
      - key: RETRIEVAL_K
        value: 20
      - key: SEMANTIC_WEIGHT
        value: 0.5
      - key: BM25_WEIGHT
        value: 0.5
      - key: RERANKER_MODEL
        value: cross-encoder/ms-marco-MiniLM-L-6-v2
      - key: USE_QUERY_ENHANCEMENT
        value: True
      - key: EXPAND_QUERIES
        value: True
      - key: USE_CONTEXT_COMPRESSION
        value: True
      - key: RELEVANCE_THRESHOLD
        value: 0.3
      - key: MAX_SENTENCES_PER_DOC
        value: 10
      - key: MAX_CONTEXT_TOKENS
        value: 2000
      - key: LLM_TEMPERATURE
        value: 0.1
      - key: LLM_MAX_TOKENS
        value: 500
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
